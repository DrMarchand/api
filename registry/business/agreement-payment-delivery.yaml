schema_version: 1.0
registry_type: agreement_payment_delivery_spine

business_root: "Design Orchard LLC"
publishing_arm: "Design Orchard℠"
originating_author: "Joseph Kyle Marchand"

providers:
  identity_ledger:
    active: hubspot
  payment:
    active: stripe
  signature:
    active: adobe_sign
    future_preferred: pandadoc
  deliverables:
    active: dropbox
  orchestration:
    active: atlas_api

required_ids:
  hubspot:
    - contact_id
    - company_id
    - deal_id
  stripe:
    - customer_id
    - checkout_session_id
    - payment_intent_id
    - invoice_id
  contract:
    - agreement_id
    - contract_provider
    - contract_provider_document_id
    - signed_pdf_location
  dropbox:
    - project_folder_id
    - shared_link
  evidence:
    - notebook_record_id
    - vault_snapshot_id
    - github_commit_sha

workflow:
  draft_agreement:
    next: send_for_signature
  send_for_signature:
    provider: adobe_sign
    next: wait_for_signature
  signature_completed:
    next: create_stripe_checkout
  payment_completed:
    next: update_hubspot
  hubspot_updated:
    next: issue_dropbox_link
  delivery_link_issued:
    next: archive_evidence

rules:
  payment_is_not_signature: true
  signature_before_payment_preferred_for_custom_work: true
  stripe_webhook_verification_required: true
  hubspot_id_required_before_payment: true
  dropbox_link_only_after_signature_or_payment_rule: true
  no_api_keys_in_git: true
  no_contracts_with_sensitive_data_in_public_repo: true
  high_value_contracts_require_manual_review: true
